services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    networks:
      - pedidos-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    networks:
      - pedidos-network
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  pedidosapp:
    image: pedidosapp
    container_name: pedidosapp
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_SERVERS}
      - Kafka__Topic=${KAFKA_TOPIC}
    depends_on:
      sqlserver:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - pedidos-network

  pedidosworker:
    image: pedidosworker
    container_name: pedidosworker
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Kafka__BootstrapServers=${KAFKA_SERVERS}
      - Kafka__Topic=${KAFKA_TOPIC}
      - Kafka__GroupId=${KAFKA_GROUP_ID}
    depends_on:
      sqlserver:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - pedidos-network

networks:
  pedidos-network:
    driver: bridge